# TeleVent — reverse proxy nginx (OVH VPS)
# Installer dans /etc/nginx/sites-available/ puis lier dans sites-enabled/.
# Ce fichier n'écoute QUE le port 80 : `certbot --nginx -d televent.gervifrais.com`
# ajoute ensuite le bloc TLS (443) et la redirection HTTP→HTTPS en conservant
# les en-têtes ci-dessous.

server {
    listen 80;
    listen [::]:80;
    server_name televent.gervifrais.com;

    # Imports SAP / uploads de fiches : marge confortable.
    client_max_body_size 25m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Assets Next.js fingerprintés → cache long côté navigateur.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # ⚠️ REQUIS : proxy.ts et NextAuth (trustHost) reconstruisent l'origine
        # réelle depuis X-Forwarded-Host / X-Forwarded-Proto. Sans ces en-têtes,
        # les redirections (login, callbacks OAuth) partent vers localhost.
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        # Resynchros SAP déclenchées depuis l'UI admin : réponses longues.
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}
